version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-processing-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/imageservice_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-super-secret-jwt-key-minimum-32-chars
      JWT_EXPIRATION: 86400000
      STORAGE_LOCATION: /app/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      SERVER_PORT: 8080
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: image-service-db
    environment:
      POSTGRES_DB: imageservice_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imageservice_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  app-network:
    driver: bridge
