spring.application.name=image-processing-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/imageservice_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# IMPORTANT: Change this in production! Use a strong random string (at least 256 bits).
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET:karimkhan-super-secret-key-12345678-change-in-prod}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Storage Configuration
storage.location=${STORAGE_LOCATION:uploads}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# Logging Configuration
logging.level.com.karimkhan.image_processing_service=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n




